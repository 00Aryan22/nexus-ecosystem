name: CI — require WalletConnect Project ID

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  enforce-on-push:
    name: Enforce NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID (pushes)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID is set
        env:
          SECRETS_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
          REPO_VAR_PROJECT_ID: ${{ vars.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
          WORKFLOW_ENV_PROJECT_ID: ${{ env.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
        run: |
          if [ -n "$SECRETS_PROJECT_ID" ]; then
            echo "Found NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID in repository secrets.";
            exit 0
          fi
          if [ -n "$REPO_VAR_PROJECT_ID" ]; then
            echo "Found NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID in repository variables.";
            exit 0
          fi
          if [ -n "$WORKFLOW_ENV_PROJECT_ID" ]; then
            echo "Found NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID in workflow env.";
            exit 0
          fi
          echo "ERROR: NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID is not set."
          echo "Set it as a repository secret or repository variable to allow builds to proceed."
          exit 1

  pr-warning:
    name: Warn about NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID (pull requests)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Warn if NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID missing
        env:
          SECRETS_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
          REPO_VAR_PROJECT_ID: ${{ vars.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
          WORKFLOW_ENV_PROJECT_ID: ${{ env.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
        run: |
          if [ -n "$SECRETS_PROJECT_ID" ] || [ -n "$REPO_VAR_PROJECT_ID" ] || [ -n "$WORKFLOW_ENV_PROJECT_ID" ]; then
            echo "NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID is set somewhere (secrets/vars/env).";
          else
            echo "WARNING: NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID is not set for this repository.";
            echo "This will cause production builds (push to main) to fail until a repository secret or variable is added.";
          fi
