name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: {}

jobs:
  # ──────────────────────────────────────────────────────────
  backend:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus
          POSTGRES_DB: nexus
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql+asyncpg://nexus:nexus@localhost:5432/nexus
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-test-secret-not-for-production
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Wait for Postgres and Redis
        run: |
          python - <<'PY'
          import socket
          import sys
          import time

          targets = [("127.0.0.1", 5432), ("127.0.0.1", 6379)]
          for host, port in targets:
              for attempt in range(1, 31):
                  try:
                      with socket.create_connection((host, port), timeout=2):
                          print(f"Connected to {host}:{port} on attempt {attempt}")
                          break
                  except OSError as exc:
                      if attempt == 30:
                          print(f"ERROR: Could not connect to {host}:{port}: {exc}", file=sys.stderr)
                          raise SystemExit(1)
                      print(f"Waiting for {host}:{port} (attempt {attempt})")
                      time.sleep(2)
          print("Postgres and Redis are available")
          PY

      - name: Ruff lint
        run: python -m ruff check app tests

      - name: Run tests
        run: python -m pytest -q --tb=short

  # ──────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          # Single root package-lock.json covers all npm workspaces
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        working-directory: apps/web

      - name: Typecheck
        run: npm run typecheck
        working-directory: apps/web

      - name: Build
        run: npm run build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
          NEXT_PUBLIC_CHAIN_ID: "80002"
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ci-placeholder
          NEXT_PUBLIC_APP_NAME: NEXUS AI

  # ──────────────────────────────────────────────────────────
  contracts:
    name: Contracts (Hardhat)
    runs-on: ubuntu-latest
    env:
      HARDHAT_TELEMETRY_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile contracts
        run: npm run compile
        working-directory: packages/contracts

      - name: Run contract tests
        run: npm test
        working-directory: packages/contracts

  # ──────────────────────────────────────────────────────────
  compose:
    name: Docker Compose Config Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose config
        run: docker compose -f infra/docker/docker-compose.yml config --quiet
