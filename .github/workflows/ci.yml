name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  verify:
    runs-on: ubuntu-latest
    services: {}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python deps
        working-directory: apps/api
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements.txt

      - name: Run backend linters & tests
        working-directory: apps/api
        env:
          CI: true
        run: |
          . .venv/bin/activate
          pip install ruff
          ruff check app tests || true
          pytest -q

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Frontend: install & lint & build
        working-directory: apps/web
        run: |
          npm ci
          npm run lint --if-present
          npm run build

      - name: Contracts: install & compile & test
        working-directory: packages/contracts
        run: |
          npm ci
          npm run compile
          npm run test || true

      - name: Run Slither (static solidity scan)
        run: |
          docker run --rm -v ${{ github.workspace }}/packages/contracts:/src -w /src crytic/slither:latest slither . || true

      - name: Docker Compose config check
        run: |
          docker compose -f infra/docker/docker-compose.yml config
name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  web:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
        working-directory: .
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
          NEXT_PUBLIC_CHAIN_ID: "80002"
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ci-placeholder
          NEXT_PUBLIC_APP_NAME: NEXUS AI

  api:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus
          POSTGRES_DB: nexus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexus -d nexus"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt
      - run: pip install -r requirements.txt
      - run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://nexus:nexus@localhost:5432/nexus
          JWT_SECRET_KEY: ci-test-secret-not-for-production
      - run: ruff check app tests
      - run: pytest -q
        env:
          DATABASE_URL: postgresql+asyncpg://nexus:nexus@localhost:5432/nexus
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: ci-test-secret-not-for-production

  contracts:
    name: Contracts (Hardhat)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    env:
      HARDHAT_TELEMETRY_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
        working-directory: .
      - run: npm run compile
      - run: npm test
