<!-- ── SHARED HEAD — paste inside <head> of every dashboard page ── -->
<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Geist:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet"/>
<!-- Design System CSS -->
<link rel="stylesheet" href="../assets/css/variables.css"/>
<link rel="stylesheet" href="../assets/css/animations.css"/>
<link rel="stylesheet" href="../assets/css/style.css"/>
<link rel="stylesheet" href="../assets/css/responsive.css"/>
<!-- Dashboard layout -->
<style>
  .dash-shell { display:flex; height:100vh; overflow:hidden; }
  .dash-main  { flex:1; display:flex; flex-direction:column; min-width:0; overflow:hidden; }
  .dash-canvas { flex:1; overflow-y:auto; padding:var(--margin-page); }
  .dash-canvas::-webkit-scrollbar { width:4px; }
  .dash-canvas::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:2px; }
  /* Topbar */
  .topbar { height:64px; display:flex; align-items:center; justify-content:space-between;
    padding:0 var(--margin-page); background:rgba(8,9,10,0.6); backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border-muted); position:sticky; top:0; z-index:50; flex-shrink:0; }
  .topbar__left { display:flex; align-items:center; gap:var(--stack-lg); flex:1; }
  .topbar__right { display:flex; align-items:center; gap:var(--stack-md); }
  .topbar__search { position:relative; max-width:360px; width:100%; }
  .topbar__search input { width:100%; background:var(--surface-obsidian); border:1px solid var(--border-muted);
    border-radius:var(--radius-full); padding:6px 16px 6px 40px; font-family:var(--font-mono);
    font-size:var(--text-label-md); color:var(--on-surface); transition:var(--transition-fast); }
  .topbar__search input:focus { border-color:var(--neon-blue); box-shadow:0 0 0 2px rgba(59,130,246,0.2); }
  .topbar__search .s-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%);
    color:var(--on-surface-variant); font-size:18px; }
  .icon-btn { padding:8px; border-radius:var(--radius-full); color:var(--on-surface-variant);
    transition:var(--transition-fast); cursor:pointer; background:none; border:none; position:relative; }
  .icon-btn:hover { color:var(--on-surface); background:rgba(255,255,255,0.05); }
  .avatar { width:32px; height:32px; border-radius:50%; border:1px solid var(--border-muted);
    overflow:hidden; background:var(--surface-variant); cursor:pointer; }
  .avatar img { width:100%; height:100%; object-fit:cover; }
  .status-chip { display:flex; align-items:center; gap:6px; padding:4px 12px;
    background:rgba(255,255,255,0.05); border:1px solid var(--border-muted);
    border-radius:var(--radius-full); font-family:var(--font-mono); font-size:var(--text-label-sm);
    color:var(--on-surface-variant); }
  .scanline { width:100%; height:100px; background:linear-gradient(0deg,rgba(59,130,246,0) 0%,rgba(59,130,246,0.05) 50%,rgba(59,130,246,0) 100%);
    opacity:0.1; position:absolute; pointer-events:none; animation:scan 8s linear infinite; z-index:5; }
</style>
