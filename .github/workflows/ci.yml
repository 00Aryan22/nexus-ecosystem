name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  backend:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus
          POSTGRES_DB: nexus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexus -d nexus"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Python dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements.txt
      - name: Wait for services and verify connections
        run: |
          . .venv/bin/activate
          sleep 5
          python -c "
import asyncio
from sqlalchemy.ext.asyncio import create_async_engine
import redis

async def test_db():
    engine = create_async_engine('postgresql+asyncpg://nexus:nexus@localhost:5432/nexus')
    try:
        async with engine.begin() as conn:
            await conn.execute(__import__('sqlalchemy').text('SELECT 1'))
        print('✓ PostgreSQL OK')
    except Exception as e:
        print(f'✗ PostgreSQL FAILED: {e}')
        raise
    finally:
        await engine.dispose()

try:
    r = redis.Redis(host='localhost', port=6379, decode_responses=True)
    r.ping()
    print('✓ Redis OK')
except Exception as e:
    print(f'✗ Redis FAILED: {e}')
    raise

asyncio.run(test_db())
"
      - name: Run diagnostic test
        working-directory: .
        run: |
          . apps/api/.venv/bin/activate
          python test_ci_setup.py
      - name: Run backend lint
        run: |
          . .venv/bin/activate
          pip install ruff
          ruff check app tests
      - name: Run backend tests
        run: |
          . .venv/bin/activate
          pytest -vv --tb=short 2>&1
        env:
          DATABASE_URL: postgresql+asyncpg://nexus:nexus@localhost:5432/nexus
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: ci-test-secret-not-for-production

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Lint frontend
        run: npm run lint --if-present
      - name: Typecheck frontend
        run: npm run typecheck --if-present
      - name: Build frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
          NEXT_PUBLIC_CHAIN_ID: '80002'
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ci-placeholder
          NEXT_PUBLIC_APP_NAME: NEXUS AI

  contracts:
    name: Contracts (Hardhat)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    env:
      HARDHAT_TELEMETRY_ENABLED: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install contract dependencies
        run: npm ci
      - name: Compile contracts
        run: npm run compile
      - name: Run contract tests
        run: npm run test

  # slither:
  #   name: Slither (Static Analysis)
  #   runs-on: ubuntu-latest
  #   needs: contracts
  #   steps:
  #     - uses: actions/checkout@v4
  #     - name: Run Slither
  #       run: |
  #         docker run --rm -v ${{ github.workspace }}/packages/contracts:/src -w /src crytic/slither:latest slither .

  compose:
    name: Docker Compose Config Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Docker Compose
        run: docker compose -f infra/docker/docker-compose.yml config
