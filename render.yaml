services:
  - type: web
    name: nexus-api
    env: docker
    repo: https://github.com/00Aryan22/nexus-ecosystem
    branch: main
    rootDir: apps/api
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "https://nexus-ecosystem-web.vercel.app,http://localhost:3000"
      - key: SIWE_DOMAIN
        value: nexus-ecosystem-web.vercel.app
      - key: SIWE_URI
        value: https://nexus-ecosystem-web.vercel.app
      - key: SIWE_CHAIN_ID
        value: "80002"
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: lax
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_DEFAULT_MODEL
        value: gpt-4o-mini
      - key: OLLAMA_BASE_URL
        value: https://ollama.com/api
      - key: OLLAMA_API_KEY
        sync: false
      - key: OLLAMA_MODEL
        value: gpt-oss:120b
      - key: OLLAMA_API_MODE
        value: native
      - key: POLYGON_AMOY_RPC_URL
        sync: false
      - key: PINATA_JWT
        sync: false
      - key: CORS_ORIGIN_REGEX
        sync: false
